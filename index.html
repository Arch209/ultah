<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD Nafisa Sayang! 🎀</title>
    <style>
        :root {
            --pink-utama: #ffc1cc;
            --pink-tua: #ff85a2;
            --bg-soft: #fff5f7;
        }

        body.locked {
            overflow: hidden !important;
            height: 100vh;
            position: fixed;
            width: 100%;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-soft);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            scroll-behavior: smooth;
        }

        #pembuka {
            position: fixed; inset: 0;
            background: white; z-index: 9999;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center; padding: 20px;
        }

        .btn-play, .btn-start-game {
            background: var(--pink-tua);
            color: white; border: none;
            padding: 15px 40px; border-radius: 50px;
            font-size: 1.2rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 5px 15px rgba(255, 133, 162, 0.4);
            transition: 0.3s;
        }

        .btn-play:hover { transform: scale(1.1); background: #ff4d7d; }

        #content {
            display: none; 
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 20;
        }

        .bingkai-foto {
            background: white; padding: 12px; margin: 60px 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 10px solid #fff; outline: 2px solid var(--pink-utama);
        }

        .bingkai-foto img { width: 100%; display: block; border-radius: 2px; }
        
        .caption {
            text-align: center; margin-top: 15px;
            color: #d81b60; font-weight: bold; font-style: italic;
        }

        .pesan-pilates {
            background: #ffe4e8; padding: 25px; border-radius: 25px;
            border: 2px dashed var(--pink-tua); text-align: center;
            margin-bottom: 50px; line-height: 1.6; color: #555;
        }

        /* GAME SECTION */
        #game-container {
            text-align: center;
            margin-top: 80px;
            padding: 20px;
            background: white;
            border-radius: 30px;
            position: relative;
        }

        #flappyCanvas {
            background: #ffeef2;
            border: 4px solid var(--pink-utama);
            border-radius: 15px;
            display: block;
            margin: 0 auto;
            max-width: 100%;
            cursor: pointer;
        }

        #gameOverlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
        }

        .sticker {
            position: fixed; pointer-events: none; z-index: 10;
            animation: melayang 4s infinite ease-in-out;
        }

        @keyframes melayang {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(20deg); }
        }
    </style>
</head>
<body class="locked">

    <div id="pembuka">
        <h2 style="color: var(--pink-tua);">Hai Nafisa 👋</h2>
        <p style="margin-bottom: 30px; color: #777;">Ada kejutan kecil buat kamu hari ini...</p>
        <button class="btn-play" onclick="bukaKejutan()">Buka Sekarang ❤️</button>
    </div>

    <div id="content">
        <header style="text-align: center; margin-bottom: 40px;">
            <h1 style="color: var(--pink-tua); font-size: 2.2rem;">Happy Birthday Nafisa! 🎂</h1>
            <p style="color: #999;">14 Mei 2026 — Special Day ✨</p>
        </header>

        <div class="pesan-pilates">
            Semangat belajar <b>Pilates</b>-nya! 🔥<br>
            Biar badannya makin sehat & lentur terus sayang! 🧘‍♀️🌸
        </div>

        <div id="album-container"></div>

        <div id="game-container">
            <h3 style="color: var(--pink-tua);">Mini Game: Nafisa Fly! ☁️</h3>
            <div style="position: relative;">
                <canvas id="flappyCanvas" width="320" height="480"></canvas>
                <div id="gameOverlay">
                    <button class="btn-start-game" id="startBtn" onclick="startGame()">MULAI GAME</button>
                </div>
            </div>
            <p id="scoreBoard" style="font-weight: bold; color: var(--pink-tua); font-size: 1.2rem; margin-top: 10px;">Score: 0</p>
        </div>

        <footer style="text-align: center; padding: 100px 0 50px 0; color: var(--pink-tua);">
            <hr style="border: 0; border-top: 1px solid var(--pink-utama); margin-bottom: 40px;">
            <h2>I Love You So Much, Nafisa! ❤️</h2>
        </footer>
    </div>

    <audio id="musik" loop>
        <source src="lagugalau.mp3" type="audio/mpeg">
    </audio>

    <script>
        const daftarCaption = [
            "Foto favorit aku bgt! 🎀", "Cantiknya kelewatan.. 😍", "Ciee yang ultah hari ini 🎈",
            "Semangat pilatesnya yaa! ✨", "Tersenyum terus ya sayang ❤️", "Mood booster aku setiap hari",
            "Jangan pernah berubah ya..", "Kamu itu istimewa bgt 🌸", "Stay healthy & happy Nafisa!",
            "I'm so lucky to have you 🧸", "Glow up terus ya cantik!", "Makin dewasa makin bijak ✨",
            "Nafisa paling terbaik! ❤️", "Bahagia terus bareng aku ya..", "Love you to the moon and back! 🌙"
        ];

        const birdImg = new Image();
        birdImg.src = 'foto/2.jpg'; 

        function bukaKejutan() {
            const lagu = document.getElementById('musik');
            // DURASI: Mulai dari detik ke-8
            lagu.currentTime = 8; 
            lagu.volume = 0;
            
            lagu.play().then(() => {
                let vol = 0;
                let fadeIn = setInterval(() => {
                    if (vol < 1) { vol += 0.1; lagu.volume = Math.min(vol, 1); } 
                    else { clearInterval(fadeIn); }
                }, 50); 
            });

            const container = document.getElementById('album-container');
            for (let i = 1; i <= 15; i++) {
                const div = document.createElement('div');
                div.className = 'bingkai-foto';
                const rotasi = (Math.random() * 8 - 4).toFixed(2); 
                const lebar = Math.floor(Math.random() * (95 - 78 + 1)) + 78;
                div.style.transform = `rotate(${rotasi}deg)`;
                div.style.width = lebar + '%';
                if(i % 2 === 0) div.style.marginLeft = 'auto';

                div.innerHTML = `
                    <img src="foto/${i}.jpg" alt="Foto ${i}" onerror="this.parentElement.style.display='none'">
                    <div class="caption">${daftarCaption[i-1] || "Love You! ❤️"}</div>
                `;
                container.appendChild(div);
            }

            document.getElementById('content').style.display = 'block';
            document.getElementById('pembuka').style.display = 'none';
            document.body.classList.remove('locked');
            document.body.style.overflow = 'auto';
            document.documentElement.style.overflow = 'auto';
            buatStiker();
        }

        // --- LOGIKA GAME EASY MODE ---
        const canvas = document.getElementById("flappyCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("scoreBoard");
        const startBtn = document.getElementById("startBtn");

        let birdY = 200, gravity = 0.5, velocity = 0, jump = -7, score = 0;
        let pipes = [], frame = 0, gameActive = false;
        const birdSize = 45;

        function startGame() {
            startBtn.parentElement.style.display = 'none';
            gameActive = true;
            resetGame();
        }

        function drawBird() {
            ctx.save(); ctx.beginPath();
            ctx.arc(70, birdY, birdSize/2, 0, Math.PI * 2);
            ctx.closePath(); ctx.clip();
            ctx.drawImage(birdImg, 70 - birdSize/2, birdY - birdSize/2, birdSize, birdSize);
            ctx.restore();
            ctx.strokeStyle = "#ff85a2"; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.arc(70, birdY, birdSize/2, 0, Math.PI * 2);
            ctx.stroke();
        }

        function createPipe() {
            if (frame % 110 === 0) { // Pipa muncul lebih jarang
                let gap = 180; // Celah pipa LEBIH LEBAR (Sangat Mudah)
                let pipeTopHeight = Math.random() * (canvas.height - gap - 100) + 50;
                pipes.push({ x: canvas.width, top: pipeTopHeight, bottom: pipeTopHeight + gap });
            }
        }

        function drawPipes() {
            ctx.fillStyle = "#ffafbd"; 
            pipes.forEach((p, index) => {
                p.x -= 2.2; // Laju pipa LEBIH LAMBAT
                ctx.fillRect(p.x, 0, 50, p.top);
                ctx.fillRect(p.x, p.bottom, 50, canvas.height - p.bottom);
                if (p.x + 50 < 0) { pipes.splice(index, 1); score++; scoreEl.innerText = "Score: " + score; }
                
                // Collision detection yang lebih bersahabat (dikurangi radiusnya sedikit)
                if (70 + 12 > p.x && 70 - 12 < p.x + 50 && (birdY - 12 < p.top || birdY + 12 > p.bottom)) {
                    gameOver();
                }
            });
        }

        function gameOver() {
            gameActive = false;
            startBtn.innerText = "COBA LAGI";
            startBtn.parentElement.style.display = 'block';
        }

        function resetGame() {
            birdY = 200; velocity = 0; pipes = []; score = 0; frame = 0; 
            scoreEl.innerText = "Score: 0";
            update();
        }

        function update() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            velocity += gravity; birdY += velocity;
            if (birdY + 20 > canvas.height || birdY - 20 < 0) { gameOver(); return; }
            drawPipes(); createPipe(); drawBird(); frame++;
            requestAnimationFrame(update);
        }

        const handleJump = (e) => { 
            if(!gameActive) return;
            if(e.type === 'keydown' && e.code !== 'Space') return;
            velocity = jump; e.preventDefault();
        };
        canvas.addEventListener("mousedown", handleJump);
        document.addEventListener("keydown", handleJump);

        function buatStiker() {
            const emoji = ['🐱', '🐰', '💖', '🧸', '🍓', '🎀', '🌸', '✨'];
            for (let i = 0; i < 25; i++) {
                let s = document.createElement('div');
                s.className = 'sticker';
                s.innerHTML = emoji[Math.floor(Math.random() * emoji.length)];
                s.style.left = Math.random() * 95 + 'vw'; s.style.top = Math.random() * 95 + 'vh';
                s.style.fontSize = (Math.random() * 20 + 20) + 'px';
                s.style.animationDelay = (Math.random() * 3) + 's';
                document.body.appendChild(s);
            }
        }
    </script>
</body>
</html>
